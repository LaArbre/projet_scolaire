<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<title>Nouveau signalement</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Déposer un signalement</h1>

<textarea id="description" placeholder="Décrivez la situation"></textarea>

<select id="type">
<option value="harcelement">Harcèlement</option>
<option value="discrimination">Discrimination</option>
<option value="ethique">Problème éthique</option>
</select>

<input type="file" id="file">

<button id="send">Envoyer</button>

<div id="message"></div>

<script src="script.js"></script>

</body>
</html>
