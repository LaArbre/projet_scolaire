<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tableau de bord — Signalements</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Toast container -->
    <div id="toastContainer" class="toast-container"></div>

    <!-- Confirm modal -->
    <div id="confirmModal" class="modal-overlay hidden">
        <div class="modal-box">
            <h3 id="confirmTitle">Confirmer l'action</h3>
            <p id="confirmMessage">Êtes-vous sûr ?</p>
            <div class="modal-actions">
                <button id="confirmCancel" class="btn-modal-cancel">Annuler</button>
                <button id="confirmOk" class="btn-modal-ok">Confirmer</button>
            </div>
        </div>
    </div>

    <div class="app-container">
        <!-- SIDEBAR -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-brand">
                <div class="brand-text">
                    <span class="brand-title">SignalPro</span>
                    <span class="brand-sub">Plateforme de signalements</span>
                </div>
            </div>

            <button class="btn-new" id="btnNewReport">
                <span class="btn-icon">+</span>
                Nouveau signalement
            </button>

            <nav class="sidebar-nav" id="sidebarNav"></nav>

            <div class="sidebar-section">
                <div class="section-label">Mes signalements</div>
                <ul class="reports-list" id="reportsList">
                    <li class="report-item skeleton"></li>
                    <li class="report-item skeleton"></li>
                    <li class="report-item skeleton"></li>
                </ul>
            </div>

            <div class="sidebar-footer">
                <div class="user-badge" id="userBadge">
                    <div class="user-avatar" id="userAvatar">?</div>
                    <div class="user-info">
                        <span class="user-name" id="userName">Chargement...</span>
                        <span class="user-role" id="userRole"></span>
                    </div>
                </div>
                <button id="btnLogout" class="btn-logout" title="Déconnexion">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                </button>
            </div>
        </aside>

        <!-- MAIN -->
        <main class="main-content" id="mainContent">
            <div class="welcome-screen">
                <div class="welcome-glow"></div>
                <div class="welcome-inner">
                    <h1>Bienvenue</h1>
                    <p>Sélectionnez un signalement dans la barre latérale<br>ou créez-en un nouveau pour commencer.</p>
                    <button class="welcome-cta" id="welcomeNewBtn">+ Nouveau signalement</button>
                </div>
            </div>
        </main>
    </div>

    <script src="script.js" type="module"></script>
</body>
</html>
