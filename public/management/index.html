<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion des signalements — SignalPro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Toast -->
    <div id="toastContainer" class="toast-container"></div>

    <!-- Drawer overlay -->
    <div id="drawerOverlay" class="drawer-overlay hidden"></div>

    <!-- Detail drawer -->
    <aside id="detailDrawer" class="detail-drawer hidden">
        <div class="drawer-header">
            <button id="drawerClose" class="drawer-close" title="Fermer">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
            <span id="drawerTitle" class="drawer-title">Détail du signalement</span>
        </div>
        <div id="drawerContent" class="drawer-content">
            <div class="drawer-loading">Chargement...</div>
        </div>
    </aside>

    <div class="page-layout">
        <!-- TOP BAR -->
        <header class="topbar">
            <div class="topbar-left">
                <a href="/dashboard/" class="back-link">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
                    Dashboard
                </a>
                <div class="topbar-divider"></div>
                <h1 class="topbar-title">
                    Gestion des signalements
                </h1>
            </div>
            <div class="topbar-right">
                <div class="live-indicator" id="liveIndicator">
                    <span class="live-dot"></span>
                    <span>En direct</span>
                </div>
                <div id="userChip" class="user-chip">
                    <div id="topbarAvatar" class="topbar-avatar">?</div>
                    <span id="topbarName">…</span>
                </div>
                <button id="btnLogout" class="btn-topbar-logout" title="Déconnexion">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                </button>
            </div>
        </header>

        <main class="main">
            <!-- STATS ROW -->
            <section class="stats-row" id="statsRow">
                <div class="stat-card" id="statOpen">
                    <div class="stat-value" id="cntOpen">—</div>
                    <div class="stat-label">Ouverts</div>
                </div>
                <div class="stat-card" id="statProgress">
                        <div class="stat-value" id="cntProgress">—</div>
                        <div class="stat-label">En cours</div>
                </div>
                <div class="stat-card" id="statWaiting">
                        <div class="stat-value" id="cntWaiting">—</div>
                        <div class="stat-label">Attente info</div>
                </div>
                <div class="stat-card" id="statClosed">
                        <div class="stat-value" id="cntClosed">—</div>
                        <div class="stat-label">Clôturés</div>
                </div>
                <div class="stat-card stat-total">
                        <div class="stat-value" id="cntTotal">—</div>
                        <div class="stat-label">Total</div>
                </div>
            </section>

            <!-- FILTERS BAR -->
            <section class="filters-bar" id="filtersBar">
                <div class="filters-left">
                    <!-- Search -->
                    <div class="filter-group search-group">
                        <svg class="search-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                        <input type="text" id="filterSearch" class="filter-input filter-search" placeholder="Rechercher par code, catégorie…">
                    </div>

                    <!-- Category -->
                    <div class="filter-group">
                        <select id="filterCategory" class="filter-select">
                            <option value="">Toutes catégories</option>
                            <option value="Harcèlement moral">Harcèlement moral</option>
                            <option value="Harcèlement sexuel">Harcèlement sexuel</option>
                            <option value="Discrimination">Discrimination</option>
                            <option value="Conflit hiérarchique">Conflit hiérarchique</option>
                            <option value="Atteinte à l'éthique">Atteinte à l'éthique</option>
                            <option value="Autre">Autre</option>
                        </select>
                    </div>

                    <!-- Date from -->
                    <div class="filter-group">
                        <label class="filter-label">Du</label>
                        <input type="date" id="filterDateFrom" class="filter-input filter-date">
                    </div>

                    <!-- Date to -->
                    <div class="filter-group">
                        <label class="filter-label">Au</label>
                        <input type="date" id="filterDateTo" class="filter-input filter-date">
                    </div>

                    <!-- Anonymous -->
                    <div class="filter-group">
                        <select id="filterAnon" class="filter-select">
                            <option value="">Anonymat</option>
                            <option value="1">Anonymes</option>
                            <option value="0">Identifiés</option>
                        </select>
                    </div>

                    <button id="btnResetFilters" class="btn-reset" title="Réinitialiser les filtres">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4.72"/></svg>
                        Reset
                    </button>
                </div>

                <div class="filters-right">
                    <!-- Closed toggle -->
                    <div class="toggle-pill" id="toggleClosed">
                        <button class="pill-btn active" data-val="open">En cours</button>
                        <button class="pill-btn" data-val="closed">Clôturés</button>
                        <button class="pill-btn" data-val="all">Tous</button>
                    </div>
                </div>
            </section>

            <!-- TABLE -->
            <section class="table-section">
                <div class="table-meta">
                    <span id="tableCount" class="table-count">— résultats</span>
                    <div class="sort-controls">
                        <label class="filter-label">Trier par</label>
                        <select id="sortSelect" class="filter-select sort-select">
                            <option value="created_at-desc">Date ↓</option>
                            <option value="created_at-asc">Date ↑</option>
                            <option value="status-asc">Statut A→Z</option>
                            <option value="category-asc">Catégorie A→Z</option>
                        </select>
                    </div>
                </div>

                <div class="table-wrapper">
                    <table class="reports-table" id="reportsTable">
                        <thead>
                            <tr>
                                <th class="col-code">Code</th>
                                <th class="col-category">Catégorie</th>
                                <th class="col-status">Statut</th>
                                <th class="col-anon">Anonyme</th>
                                <th class="col-date">Créé le</th>
                                <th class="col-updated">Mis à jour</th>
                                <th class="col-actions"></th>
                            </tr>
                        </thead>
                        <tbody id="tableBody">
                            <!-- skeleton -->
                            <tr class="skeleton-row"><td colspan="7"><div class="skeleton-line"></div></td></tr>
                            <tr class="skeleton-row"><td colspan="7"><div class="skeleton-line"></div></td></tr>
                            <tr class="skeleton-row"><td colspan="7"><div class="skeleton-line"></div></td></tr>
                            <tr class="skeleton-row"><td colspan="7"><div class="skeleton-line"></div></td></tr>
                            <tr class="skeleton-row"><td colspan="7"><div class="skeleton-line"></div></td></tr>
                        </tbody>
                    </table>
                </div>

                <!-- Pagination -->
                <div class="pagination" id="pagination">
                    <button id="btnPrevPage" class="page-btn" disabled>
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
                        Précédent
                    </button>
                    <div class="page-info">
                        Page <span id="pageNum">1</span> / <span id="pageTotal">1</span>
                    </div>
                    <button id="btnNextPage" class="page-btn">
                        Suivant
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
                    </button>
                </div>
            </section>
        </main>
    </div>

    <script src="script.js" type="module"></script>
</body>
</html>
